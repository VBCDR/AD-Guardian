name: CI

on:
  push:
  pull_request:
    branches: [main, master]

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore dependencies
        run: dotnet restore "AD Guardian.sln"

      - name: Build
        run: dotnet build "AD Guardian.sln" --configuration Release --no-restore

      - name: Test
        run: dotnet test "Domain Guardian.Tests/Domain Guardian.Tests.csproj" --configuration Release --no-build --verbosity normal
